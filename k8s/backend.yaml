apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: devops-case
data:
  ATLAS_URI: "mongodb://mongodb:27017"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devops-case
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: devops-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5050
          envFrom:
            - configMapRef:
                name: backend-config
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 5050
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 5050
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: devops-case
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 5050
      targetPort: 5050
      nodePort: 30505